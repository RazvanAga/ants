<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ant Colony Simulation</title>
    <style>
      :root {
        color-scheme: dark;
        --field: #7f7f7f;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 1rem;
        padding: 1.5rem;
        background: #1c1c1c;
        color: #e8e8e8;
        font: 14px/1.4 system-ui, sans-serif;
      }
      #controls {
        display: flex;
        gap: 0.75rem;
        align-items: center;
      }
      button {
        font: inherit;
        padding: 0.4rem 0.9rem;
        border: 1px solid #555;
        border-radius: 6px;
        background: #2c2c2c;
        color: inherit;
        cursor: pointer;
      }
      button:hover {
        background: #383838;
      }
      button.active {
        background: #4a4a4a;
        border-color: #8a8a8a;
      }
      #tools,
      #speeds {
        display: flex;
        gap: 0.4rem;
        border-left: 1px solid #444;
        padding-left: 0.75rem;
      }
      canvas {
        border: 1px solid #444;
        display: block;
        image-rendering: pixelated;
        touch-action: none; /* let press-and-drag paint instead of scrolling (#15) */
      }
      #status {
        opacity: 0.7;
        font-variant-numeric: tabular-nums;
      }
      #sliders {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
        gap: 0.5rem 1.25rem;
        width: min(100%, 660px);
        padding: 0.75rem 1rem;
        border: 1px solid #444;
        border-radius: 8px;
        background: #232323;
      }
      #sliders label {
        display: grid;
        grid-template-columns: 1fr auto;
        align-items: center;
        gap: 0.25rem 0.5rem;
      }
      #sliders label span {
        opacity: 0.85;
      }
      #sliders label output {
        font-variant-numeric: tabular-nums;
        opacity: 0.7;
      }
      #sliders input[type="range"] {
        grid-column: 1 / -1;
        width: 100%;
        accent-color: #8a8a8a;
      }
      #reset-sliders {
        grid-column: 1 / -1;
        justify-self: start;
        margin-top: 0.25rem;
      }
    </style>
  </head>
  <body>
    <div id="controls">
      <button id="play-pause" type="button" title="Play/Pause (Space)">Pause</button>
      <button id="reset" type="button" title="Reset (R)">Reset</button>
      <div id="tools">
        <button id="tool-nest" type="button" title="Nest tool (1)">Nest</button>
        <button id="tool-food" type="button" title="Food tool (2)">Food</button>
        <button id="tool-erase" type="button" title="Erase tool (3)">Erase</button>
      </div>
      <div id="speeds" title="Speed — faster (+) / slower (−)">
        <button type="button" data-speed="1">1x</button>
        <button type="button" data-speed="2">2x</button>
        <button type="button" data-speed="4">4x</button>
        <button type="button" data-speed="8">8x</button>
      </div>
      <span id="status"></span>
    </div>
    <canvas id="field"></canvas>
    <div id="sliders"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
